<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>

<body class="h-screen">
    <div class="h-full bg-white grid md:grid-cols-10">
        <!-- left  -->
        <div class="col-span-6 bg-gradient-to-b from-blue-500 to-blue-900 text-white flex items-center pl-40 py-20">
            <div class="max-w">
                <h1 class="text-5xl font-bold mb-3">
                    GoFinance
                </h1>
                <p class="text-xl text-white-500 mb-6">The most popular peer to peer lending at SEA</p>
                <button class="bg-blue-500 text-white text-sm px-6 py-2 rounded-full ">
                    Read More
                </button>
            </div>
            <div class="absolute bottom-[-160px] left-[-120px] w-[450px] h-[420px] border border-blue-500 rounded-full">
            </div>
            <div class="absolute bottom-[-190px] left-[-40px] w-[450px] h-[420px] border border-blue-500 rounded-full">
            </div>
        </div>
        <!-- right  -->
        <div class="col-span-4 flex flex-col justify-center  px-[120px] py-16">
            <div class="max-w w-full mx-auto">
                <h2 class="text-4xl font-bold text-[#333333]">
                    Hello!
                </h2>
                <p class="text-[#333333] text-xl mb-8">
                    Sign up to Get Started
                </p>
                <!-- user  -->
                <div class="relative mb-4">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-7 text-gray-300">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6">
                            <path fill-rule="evenodd"
                                d="M7.5 6a4.5 4.5 0 1 1 9 0 4.5 4.5 0 0 1-9 0ZM3.751 20.105a8.25 8.25 0 0 1 16.498 0 .75.75 0 0 1-.437.695A18.683 18.683 0 0 1 12 22.5c-2.786 0-5.433-.608-7.812-1.7a.75.75 0 0 1-.437-.695Z"
                                clip-rule="evenodd" />
                        </svg>
                    </span>
                    <input type="text" placeholder="Full name"
                        class="w-[307px] h-[60px] pl-16 px-5 py-3 rounded-full border border-gray-200 bg-white focus:outline-none focus:ring-2 focus:ring-blue-400" />
                </div>
                <!-- mail  -->
                <div class="relative mb-4">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-7 text-gray-300">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                            stroke="currentColor" class="size-6">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75" />
                        </svg>
                    </span>
                    <input type="email" placeholder="Email Address"
                        class="w-[307px] h-[60px] pl-16 px-5 py-3 rounded-full border border-gray-200 bg-white focus:outline-none focus:ring-2 focus:ring-blue-400" />
                </div>
                <!-- pw  -->
                <div class=" relative mb-6">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-7 text-gray-300">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6">
                            <path fill-rule="evenodd"
                                d="M12 1.5a5.25 5.25 0 0 0-5.25 5.25v3a3 3 0 0 0-3 3v6.75a3 3 0 0 0 3 3h10.5a3 3 0 0 0 3-3v-6.75a3 3 0 0 0-3-3v-3c0-2.9-2.35-5.25-5.25-5.25Zm3.75 8.25v-3a3.75 3.75 0 1 0-7.5 0v3h7.5Z"
                                clip-rule="evenodd" />
                        </svg>
                    </span>
                    <input type="password" placeholder="Password"
                        class="w-[307px] h-[60px] pl-16 px-5 py-3 rounded-full border border-gray-200 bg-white focus:outline-none focus:ring-2 focus:ring-blue-400" />
                </div>
                <!-- login btn  -->
                <button class="w-[307px] h-[57px]  bg-blue-600 text-white py-3 rounded-full text-sm transition">
                    Register
                </button>
            </div>
        </div>
</body>

</html>
